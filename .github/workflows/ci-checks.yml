name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. CHECK INTERNAL MARKDOWN LINKS ──────────────────────────────────────
  link-check:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: accessibility-resource/package-lock.json

      - name: Install dependencies
        working-directory: accessibility-resource
        run: npm ci

      - name: Run link checker
        working-directory: accessibility-resource
        run: npm run lint:links
        # Non-blocking for now — change to `exit 1` once all links are clean
        continue-on-error: true

  # ── 2. BUILD CHECK ────────────────────────────────────────────────────────
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: accessibility-resource/package-lock.json

      - name: Install dependencies
        working-directory: accessibility-resource
        run: npm ci

      - name: Build Docusaurus
        working-directory: accessibility-resource
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: accessibility-resource/build
          retention-days: 1

  # ── 3. ACCESSIBILITY AUDIT (on built site) ────────────────────────────────
  a11y-audit:
    name: Accessibility audit (pa11y)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pa11y-ci
        run: npm install -g pa11y-ci serve

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build

      - name: Serve site and run audit
        run: |
          serve build -l 3000 &
          sleep 3
          pa11y-ci \
            --config .pa11y-config.json \
            --sitemap http://localhost:3000/accessibility-hub/sitemap.xml \
            --sitemap-find 'https://alexarguello.github.io' \
            --sitemap-replace 'http://localhost:3000'
        # Non-blocking until all issues are resolved
        continue-on-error: true
